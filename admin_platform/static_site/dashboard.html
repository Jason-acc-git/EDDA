<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>EDDA 관리 플랫폼 - 대시보드</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .message {
            padding: 10px;
            background-color: #e8f4f8;
            border-left: 4px solid #4a90e2;
            margin-bottom: 20px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EDDA 관리 플랫폼 - 대시보드</h1>
        <div class="message">
            <p>Mac Mini 서버에서 성공적으로 실행 중입니다.</p>
        </div>
        
        <div class="card">
            <h2>월간 초과 근무 시간</h2>
            <p>이번 달 초과 근무 시간: <strong>0시간</strong></p>
        </div>
        
        <div class="card">
            <h2>보상 휴가 현황</h2>
            <p>남은 보상 휴가 시간: <strong>0시간</strong></p>
        </div>
        
        <div class="card">
            <h2>최근 신청 내역</h2>
            <p>최근 신청 내역이 없습니다.</p>
        </div>
        
        <a href="/index.html" class="button">홈으로 돌아가기</a>
    </div>
</body>
</html>
