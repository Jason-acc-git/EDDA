{% extends "base.html" %}

{% block title %}대휴 신청{% endblock %}


{% block extra_css %}
<style>
@keyframes moveLeftRightNoRotate {
    0% { transform: translateX(0%); }
    10% { transform: translateX(30%); }
    20% { transform: translateX(60%); }
    30% { transform: translateX(90%); }
    40% { transform: translateX(120%); }
    50% { transform: translateX(150%); }
    60% { transform: translateX(120%); }
    70% { transform: translateX(90%); }
    80% { transform: translateX(60%); }
    90% { transform: translateX(30%); }
    100% { transform: translateX(0%); }
}
.animated-gif {
    animation: moveLeftRightNoRotate 2s linear infinite;
    position: relative;
    display: inline-block;
    width: 50px;
    height: 50px;
}
    100% { transform: translateX(0%); }
}
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
</style>
{% endblock %}
{% block content %}
    <div class="card p-4 mx-auto compensatory-page" style="max-width: 600px;">
<h3 class="position-relative">대휴 신청<img src="/static/images/run.gif" alt="running" class="animated-gif" style="margin-left: 20px; width: 120px; height: 120px; max-width: 120px; max-height: 120px;"></h3>
        <div class="alert alert-light-yellow">남은 대휴 시간: {{ remaining_hours }}시간</div>
        <form action="{{ '/request/edit/compensatory-leave/' ~ request_data.id if request_data else '/request/compensatory-leave' }}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="leave_date" class="form-label">대휴 사용일</label>
                <input type="date" id="leave_date" name="leave_date" class="form-control form-control-sm" value="{{ request_data.content.leave_date if request_data else '' }}" required>
            </div>
            <div class="mb-3">
                <label for="hours" class="form-label">사용할 시간</label>
                <select id="hours" name="hours" class="form-control form-control-sm" required><option value="">선택하세요</option><option value="4시간 오전" {{ 'selected' if request_data and request_data.content.hours == "4시간 오전" else '' }}>4시간 오전(09:00~14:00)</option><option value="4시간 오후" {{ 'selected' if request_data and request_data.content.hours == "4시간 오후" else '' }}>4시간 오후(14:00~18:00)</option><option value="8시간" {{ 'selected' if request_data and request_data.content.hours == "8시간" else '' }}>8시간</option></select>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                {% if request_data %}
                    <a href="/dashboard" class="btn btn-secondary">취소</a>
                    <a href="/request/delete/{{ request_data.id }}" class="btn btn-danger" onclick="return confirm('정말로 삭제하시겠습니까?')">삭제</a>
                    <button type="submit" class="btn btn-submit">수정 저장</button>
                {% else %}
                    <a href="/dashboard" class="btn btn-secondary">취소</a>
                    <button type="submit" class="btn btn-submit">제출</button>
                {% endif %}
            </div>
        </form>
    </div>
        <script>
        document.addEventListener('DOMContentLoaded', function() {
            const hoursInput = document.getElementById('hours');
            const remainingHours = parseFloat('{{ remaining_hours }}');

            if (remainingHours <= 0) {
                alert('남은 대휴 시간이 없어 신청할 수 없습니다.');
                hoursInput.disabled = true;
                document.querySelector('button[type="submit"]').disabled = true;
            }

        });
    </script>
{% endblock %}
