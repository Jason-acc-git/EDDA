<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=1.5" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="card p-4 mx-auto" style="max-width: 500px;">

            <h3 class="mb-4 text-center">최초 로그인 - 비밀번호 변경</h3>
            <p class="text-center text-muted mb-4">보안을 위해 초기 비밀번호를 변경해주세요.</p>

            <form method="post">
                <div class="mb-3">
                    <label for="new_password" class="form-label">새 비밀번호</label>
                    <input type="password" name="new_password" id="new_password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">새 비밀번호 확인</label>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control" required>
                </div>

                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100">비밀번호 변경</button>
            </form>

        </div>
    </div>
</body>
</html>
