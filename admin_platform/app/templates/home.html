<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Manufacturing R&D Accelerator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=1.5" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="card p-4 mx-auto" style="max-width: 500px;">
            <div class="d-flex align-items-center mb-3">
                <img src="/static/images/merged-4.gif" alt="Logo" style="width: 80px; height: 80px;">
                <div class="ms-3" style="margin-top: 15px;">
                    <h3 class="mb-1">Apple Manufacturing R&D Accelerator</h3>
                    <p class="text-muted">(행정지원 시스템)</p>
                </div>
            </div>

            <form action="/login" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">이름</label>
                    <input type="text" name="name" id="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>

                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100">로그인</button>
            </form>

            <div class="text-center mt-3">
                <a href="/forgot-password" class="text-muted"><small>비밀번호를 잊으셨나요?</small></a>
            </div>

        </div>
    </div>
</body>
</html>
