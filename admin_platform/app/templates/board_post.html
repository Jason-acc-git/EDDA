<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - Apple Manufacturing R&D Accelerator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2>{{ post.category }}</h2>
                            <div>
                                <a href="/board/{{ post.category }}" class="btn btn-outline-secondary me-2">목록</a>
                                <a href="/board" class="btn btn-outline-primary">게시판 홈</a>
                            </div>
                        </div>
                        
                        <div class="card">
                            <div class="card-header bg-light">
                                <div class="row">
                                    <div class="col-md-8">
                                        <h4 class="mb-0">{{ post.title }}</h4>
                                    </div>
                                    <div class="col-md-4 text-end">
                                        <small class="text-muted">
                                            작성자: {{ post.author }}<br>
                                            작성일: {{ post.created_at[:16] }}
                                        </small>
                                    </div>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="content" style="min-height: 200px; white-space: pre-wrap;">{{ post.content }}</div>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <a href="/board/{{ post.category }}" class="btn btn-secondary me-2">목록으로</a>
                            <a href="/" class="btn btn-primary">Home</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
