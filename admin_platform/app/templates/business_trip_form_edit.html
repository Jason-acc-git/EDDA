{% extends "base.html" %}

{% block title %}출장 수정{% endblock %}

{% block content %}
    <div class="card p-4 mx-auto" style="max-width: 1100px;">
        <h3 class="mb-4">출장 수정</h3>

        <form action="/request/edit/business-trip/{{ request_data.id }}" method="post" enctype="multipart/form-data">
            <div class="row g-4">

                <div class="col-md-6">
                    <div class="card p-4 h-100">

                        <div class="mb-3">
                            <label class="form-label">출장일시 <span class="text-danger">*</span></label>
                            <input type="date" name="start_date" class="form-control form-control-sm" value="{{ request_data.content.start_date }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">출장 종료 일시</label>
                            <input type="date" name="end_date" class="form-control form-control-sm" value="{{ request_data.content.end_date }}">
                            <div class="form-text">하루 출장이 아닌 경우에만 작성</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">출장지역 <span class="text-danger">*</span></label>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="region" value="서울" id="region_seoul" {% if request_data.content.region == '서울' %}checked{% endif %}>
                                <label class="form-check-label" for="region_seoul">서울</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="region" value="포항시" id="region_pohang" {% if request_data.content.region == '포항시' %}checked{% endif %}>
                                <label class="form-check-label" for="region_pohang">포항시</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="region" value="광역시" id="region_metro" {% if request_data.content.region == '광역시' %}checked{% endif %}>
                                <label class="form-check-label" for="region_metro">광역시</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="region" value="광역시를 제외한 지방" id="region_local" {% if request_data.content.region == '광역시를 제외한 지방' %}checked{% endif %}>
                                <label class="form-check-label" for="region_local">광역시를 제외한 지방</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="region" value="기타" id="region_other_radio" {% if request_data.content.region == '기타' %}checked{% endif %}>
                                <label class="form-check-label" for="region_other_radio">기타</label>
                            </div>

                            <div class="mt-2">
                                <input type="text" name="region_other" class="form-control" placeholder="기타 지역 입력" value="{{ request_data.content.region_other }}">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card p-4 h-100">
                        <div class="mb-3">
                            <label class="form-label">출장기관 <span class="text-danger">*</span></label>
                            <input type="text" name="organization" class="form-control" value="{{ request_data.content.organization }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">목적 <span class="text-danger">*</span></label>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="purpose" value="대외기관 협력 확대(신규 대외기관인 경우)" id="purpose1" {% if request_data.content.purpose == '대외기관 협력 확대(신규 대외기관인 경우)' %}checked{% endif %}>
                                <label class="form-check-label" for="purpose1">대외기관 협력 확대(신규 대외기관인 경우)</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="purpose" value="센터 및 행사(SME Week, SME Day, SMF) 홍보" id="purpose2" {% if request_data.content.purpose == '센터 및 행사(SME Week, SME Day, SMF) 홍보' %}checked{% endif %}>
                                <label class="form-check-label" for="purpose2">센터 및 행사(SME Week, SME Day, SMF) 홍보</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="purpose" value="업무 관련 협의" id="purpose3" {% if request_data.content.purpose == '업무 관련 협의' %}checked{% endif %}>
                                <label class="form-check-label" for="purpose3">업무 관련 협의</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="purpose" value="대외기관(애플 포함) 및 포스텍 요청" id="purpose4" {% if request_data.content.purpose == '대외기관(애플 포함) 및 포스텍 요청' %}checked{% endif %}>
                                <label class="form-check-label" for="purpose4">대외기관(애플 포함) 및 포스텍 요청</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="purpose" value="기타" id="purpose5" {% if request_data.content.purpose == '기타' %}checked{% endif %}>
                                <label class="form-check-label" for="purpose5">기타</label>
                            </div>

                            <div class="mt-2">
                                <input type="text" name="purpose_other" class="form-control" placeholder="기타 목적 입력" value="{{ request_data.content.purpose_other }}">
                            </div>
                        </div>


                        <div class="mb-3">
                            <label class="form-label">주요 이동수단 <span class="text-danger">*</span></label>
                            <select name="transport" class="form-select form-select-sm">
                                <option value="">선택</option>
                                <option value="자가용" {% if request_data.content.transport == '자가용' %}selected{% endif %}>자가용</option>
                                <option value="KTX" {% if request_data.content.transport == 'KTX' %}selected{% endif %}>KTX</option>
                                <option value="버스" {% if request_data.content.transport == '버스' %}selected{% endif %}>버스</option>
                                <option value="항공" {% if request_data.content.transport == '항공' %}selected{% endif %}>항공</option>
                                <option value="택시" {% if request_data.content.transport == '택시' %}selected{% endif %}>택시</option>
                                <option value="기타" {% if request_data.content.transport == '기타' %}selected{% endif %}>기타</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <a href="/dashboard" class="btn btn-secondary">취소</a>
                            <button type="submit" class="btn btn-dark">수정 저장</button>
                        </div>
                    </div>
                </div>

            </div>
        </form>
    </div>
{% endblock %}
