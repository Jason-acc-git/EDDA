{% extends "base.html" %}

{% block title %}시간외근무 수정{% endblock %}

{% block content %}
    <div class="card p-4 mx-auto" style="max-width: 1100px;">
        <h3 class="mb-4">시간외 근무 수정</h3>

        <form action="/request/edit/overtime/{{ request_data.id }}" method="post" enctype="multipart/form-data">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card p-4 h-100">

                        <div class="mb-3">
                            <label class="form-label">시간외 근로일 <span class="text-danger">*</span></label>
                            <input type="date" name="work_date" class="form-control form-control-sm" value="{{ request_data.content.work_date }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">시간외 근로유형 <span class="text-danger">*</span></label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="work_type" id="regular_work" value="평일연장근로" {% if request_data.content.work_type == '평일연장근로' %}checked{% endif %}>
                                <label class="form-check-label" for="regular_work">평일연장근로</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="work_type" id="holiday_work" value="휴일근로" {% if request_data.content.work_type == '휴일근로' %}checked{% endif %}>
                                <label class="form-check-label" for="holiday_work">휴일근로</label>
                            </div>
                        </div>

                        <div class="mb-3" id="weekday_work_hours_field">
                            <label class="form-label">시간외 근로시간 (평일) <span class="text-danger">*</span></label>
                            <div class="form-text mb-2">시간외 근무시간(평일)을 선택해주세요.</div>
                            <select name="work_hours_weekday" class="form-select form-select-sm">
                                <option value="1" {% if request_data.content.work_hours_weekday == 1 %}selected{% endif %}>1시간</option>
                                <option value="2" {% if request_data.content.work_hours_weekday == 2 %}selected{% endif %}>2시간</option>
                                <option value="3" {% if request_data.content.work_hours_weekday == 3 %}selected{% endif %}>3시간</option>
                            </select>
                        </div>

                        <div class="mb-3" id="holiday_work_hours_field" style="display: none;">
                            <label class="form-label">시간외 근로시간 (휴일) <span class="text-danger">*</span></label>
                            <div class="form-text mb-2">휴일 근무시간을 선택해주세요. (최대 6시간)</div>
                            <select name="work_hours_holiday" class="form-select form-select-sm">
                                <option value="1" {% if request_data.content.work_hours_holiday == 1 %}selected{% endif %}>1시간</option>
                                <option value="2" {% if request_data.content.work_hours_holiday == 2 %}selected{% endif %}>2시간</option>
                                <option value="3" {% if request_data.content.work_hours_holiday == 3 %}selected{% endif %}>3시간</option>
                                <option value="4" {% if request_data.content.work_hours_holiday == 4 %}selected{% endif %}>4시간</option>
                                <option value="5" {% if request_data.content.work_hours_holiday == 5 %}selected{% endif %}>5시간</option>
                                <option value="6" {% if request_data.content.work_hours_holiday == 6 %}selected{% endif %}>6시간</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">시간외 근무 시작 <span class="text-danger">*</span></label>
                            <select name="work_start_time" class="form-select form-select-sm" required>
                                <option value="">시작 시간 선택</option>
                                <option value="06:00">06:00</option>
                                <option value="07:00">07:00</option>
                                <option value="08:00">08:00</option>
                                <option value="09:00">09:00</option>
                                <option value="10:00">10:00</option>
                                <option value="11:00">11:00</option>
                                <option value="12:00">12:00</option>
                                <option value="13:00">13:00</option>
                                <option value="14:00">14:00</option>
                                <option value="15:00">15:00</option>
                                <option value="16:00">16:00</option>
                                <option value="17:00">17:00</option>
                                <option value="18:00">18:00</option>
                                <option value="19:00">19:00</option>
                                <option value="20:00">20:00</option>
                                <option value="21:00">21:00</option>
                                <option value="22:00">22:00</option>
                                <option value="23:00">23:00</option>
                            </select>
                            <div class="form-text mt-1"><small class="text-muted">휴일에 3시간 이상 근무시 1시간이 자동으로 휴게시간으로 포함되어 종료시간이 계산됩니다</small></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">시간외 근로 사유 (구체적으로 명시) <span class="text-danger">*</span></label>
                            <textarea name="reason_detail" class="form-control" rows="3" required>{{ request_data.content.reason_detail }}</textarea>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card p-4 h-100">
                        <div class="mb-3">
                            <label class="form-label">시간외 근로 신청/승인 사유 (택일) <span class="text-danger">*</span></label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="reason_type" id="reason1" value="경영진(보직자 등) 지시사항으로 기한내 완수를 위해 불가피한 경우" {% if request_data.content.reason_type == "경영진(보직자 등) 지시사항으로 기한내 완수를 위해 불가피한 경우" %}checked{% endif %}>
                                <label class="form-check-label" for="reason1">경영진(보직자 등) 지시사항으로 기한내 완수를 위해 불가피한 경우</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="reason_type" id="reason2" value="대내외 협조요청 사항으로 기한내 완수를 위해 불가피한 경우" {% if request_data.content.reason_type == "대내외 협조요청 사항으로 기한내 완수를 위해 불가피한 경우" %}checked{% endif %}>
                                <label class="form-check-label" for="reason2">대내외 협조요청 사항으로 기한내 완수를 위해 불가피한 경우</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="reason_type" id="reason3" value="부서장 지시사항 또는 업무의 특성에 따라 특정기한내 완료해야 하는 업무(일상적/잔업성 업무는 제외)" {% if request_data.content.reason_type == "부서장 지시사항 또는 업무의 특성에 따라 특정기한내 완료해야 하는 업무(일상적/잔업성 업무는 제외)" %}checked{% endif %}>
                                <label class="form-check-label" for="reason3">부서장 지시사항 또는 업무의 특성에 따라 특정기한내 완료해야 하는 업무(일상적/잔업성 업무는 제외)</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">시간외 근로 구분 <span class="text-danger">*</span></label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="work_location" id="office" value="사무실" {% if request_data.content.work_location == "사무실" %}checked{% endif %}>
                                <label class="form-check-label" for="office">사무실</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="work_location" id="home" value="재택" {% if request_data.content.work_location == "재택" %}checked{% endif %}>
                                <label class="form-check-label" for="home">재택 (재택 근무시 반드시 유선 확인 후 신청, 별도 완료 보고 필수)</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">시간외시간 수당/대체 휴가 여부 <span class="text-danger">*</span></label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="compensation" id="allowance" value="수당지급" {% if request_data.content.compensation == "수당지급" %}checked{% endif %}>
                                <label class="form-check-label" for="allowance">수당지급을 원합니다. (월 12시간 이내, 초과시에는 대체 휴가로 인정)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="compensation" id="compensatory_leave" value="대체휴가" {% if request_data.content.compensation == "대체휴가" %}checked{% endif %}>
                                <label class="form-check-label" for="compensatory_leave">대체 휴가를 원합니다. (대체 휴가는 추후 신청)</label>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-secondary" onclick="location.href='/dashboard'">취소</button>
                            <a href="/request/delete/{{ request_data.id }}" class="btn btn-danger" onclick="return confirm('정말로 삭제하시겠습니까?')">삭제</a>
                            <button type="submit" class="btn btn-submit">수정 저장</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        const weekdayInput = document.querySelector('[name="work_hours_weekday"]');
        const holidayInput = document.querySelector('[name="work_hours_holiday"]');

        const weekdayField = document.getElementById('weekday_work_hours_field');
        const holidayField = document.getElementById('holiday_work_hours_field');

        function toggleWorkHoursFields() {
            const weekdayField = document.getElementById('weekday_work_hours_field');
            const holidayField = document.getElementById('holiday_work_hours_field');
            console.log("toggleWorkHoursFields called");
            const workType = document.querySelector('input[name="work_type"]:checked').id;
            if (workType === 'holiday_work') {
                weekdayField.style.display = 'none';
                holidayField.style.display = 'block';
            } else {
                weekdayField.style.display = 'block';
                holidayField.style.display = 'none';
        }
            }

        document.querySelectorAll('input[name="work_type"]').forEach(radio => {
            radio.addEventListener('change', () => {
                console.log("work type changed to:", radio.value);
                // 시간 선택 리셋
                const weekdaySelect = document.querySelector("select[name='work_hours_weekday']");
                const holidaySelect = document.querySelector("select[name='work_hours_holiday']");
                const workStartTimeSelect = document.querySelector("select[name='work_start_time']");
                if (weekdaySelect) weekdaySelect.value = "0";
                if (holidaySelect) holidaySelect.value = "0";
                if (workStartTimeSelect) workStartTimeSelect.value = "";
                toggleWorkHoursFields();
            });
        });


        // 자동 근로유형 선택 기능
        const workDateInput = document.querySelector("input[name='work_date']");
        if (workDateInput) {
            const koreanHolidays = ["2024-01-01", "2024-02-09", "2024-02-10", "2024-02-11", "2024-02-12", "2024-03-01", "2024-05-05", "2024-05-06", "2024-05-15", "2024-06-06", "2024-08-15", "2024-09-16", "2024-09-17", "2024-09-18", "2024-10-03", "2024-10-09", "2024-12-25", "2025-01-01", "2025-01-28", "2025-01-29", "2025-01-30", "2025-03-01", "2025-05-05", "2025-05-15", "2025-06-06", "2025-08-15", "2025-10-03", "2025-10-06", "2025-10-07", "2025-10-08", "2025-10-09", "2025-12-25", "2026-01-01", "2026-02-16", "2026-02-17", "2026-02-18", "2026-03-01", "2026-05-05", "2026-05-15", "2026-05-24", "2026-06-06", "2026-08-15", "2026-09-24", "2026-09-25", "2026-09-26", "2026-10-03", "2026-10-09", "2026-12-25"];

            function isHoliday(dateString) {
                const date = new Date(dateString);
                const dayOfWeek = date.getDay();
                return dayOfWeek === 0 || dayOfWeek === 6 || koreanHolidays.includes(dateString);
            }

            console.log("workDateInput found:", workDateInput);
            workDateInput.addEventListener('change', function() {
                const selectedDate = this.value;
                if (!selectedDate) return;

                const regularWorkRadio = document.getElementById("regular_work");
                const holidayWorkRadio = document.getElementById("holiday_work");

                if (isHoliday(selectedDate)) {
                    holidayWorkRadio.checked = true;
                } else {
                    regularWorkRadio.checked = true;
                }

                // 시간 리셋
                const weekdaySelect = document.querySelector("select[name='work_hours_weekday']");
                const holidaySelect = document.querySelector("select[name='work_hours_holiday']");
                const workStartTimeSelect = document.querySelector("select[name='work_start_time']");
                if (weekdaySelect) weekdaySelect.value = "0";
                if (holidaySelect) holidaySelect.value = "0";
                if (workStartTimeSelect) workStartTimeSelect.value = "";
                toggleWorkHoursFields();
            });
        }


        // 페이지 로드 시 초기 상태 설정
        document.addEventListener('DOMContentLoaded', toggleWorkHoursFields);

    </script>
{% endblock %}
